<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>J.A.R.V.I.S</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00f5ff;
    --blue: #0080ff;
    --green: #00ff88;
    --yellow: #ffcc00;
    --red: #ff3355;
    --dark: #020a14;
    --panel: #040d1a;
    --border: rgba(0,245,255,0.15);
    --glow: 0 0 20px rgba(0,245,255,0.3);
  }

  /* KÖKTEN ÇÖZÜM: MAVİ DOKUNMA İZLERİNİ VE SEÇİMLERİ ENGELLEME */
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent !important; 
    outline: none !important;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    background: var(--dark);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    overflow: hidden;
    cursor: crosshair;
  }

  /* SCANLINE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,245,255,0.015) 2px,
      rgba(0,245,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,20,40,0.8);
    backdrop-filter: blur(10px);
    height: 48px;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 6px;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,245,255,0.5);
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,255,136,0.1);
    border: 1px solid rgba(0,255,136,0.3);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    color: var(--green);
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .topbar-center {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 13px;
  }

  .topbar-time {
    font-family: 'Orbitron', monospace;
    font-size: 15px;
    color: #fff;
    letter-spacing: 2px;
  }

  .topbar-weather {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    font-family: 'Orbitron', monospace;
  }

  /* MAIN LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 280px 1fr 320px;
    height: calc(100vh - 48px);
    gap: 0;
  }

  /* PANELS */
  .panel {
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(0,245,255,0.2) transparent;
  }

  .panel:last-child { border-right: none; border-left: 1px solid var(--border); }

  .panel-section {
    border-bottom: 1px solid var(--border);
    padding: 14px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--cyan);
    opacity: 0.8;
  }

  .section-icon {
    font-size: 12px;
    opacity: 0.6;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .section-icon:hover { opacity: 1; }

  /* STAT BARS */
  .stat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 11px;
  }

  .stat-label { color: rgba(255,255,255,0.5); width: 60px; }
  .stat-val { color: #fff; width: 40px; text-align: right; font-size: 10px; }

  .bar-wrap {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    margin: 0 8px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s ease;
    position: relative;
  }

  .bar-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0;
    width: 4px; height: 100%;
    background: white;
    border-radius: 2px;
    box-shadow: 0 0 6px white;
  }

  .bar-cpu { background: linear-gradient(90deg, #0080ff, #00f5ff); }
  .bar-ram { background: linear-gradient(90deg, #00cc44, #00ff88); }
  .bar-disk { background: linear-gradient(90deg, #ff6600, #ffcc00); }
  .bar-bat { background: linear-gradient(90deg, #00ff88, #00f5ff); }

  /* MINI STATS GRID */
  .mini-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }

  .mini-stat {
    background: rgba(0,245,255,0.05);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 6px;
    text-align: center;
  }

  .mini-stat-val {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: #fff;
    display: block;
  }

  .mini-stat-label {
    font-size: 9px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* WEATHER */
  .weather-main {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .weather-temp {
    font-family: 'Orbitron', monospace;
    font-size: 36px;
    color: #fff;
    line-height: 1;
  }

  .weather-icon { font-family: 'Orbitron', monospace; font-size: 12px; color: var(--cyan); letter-spacing: 1px; }

  .weather-desc {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
    text-transform: uppercase;
  }

  .weather-city {
    font-size: 12px;
    color: var(--cyan);
    margin-bottom: 2px;
  }

  .weather-details {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-top: 10px;
  }

  .weather-detail {
    text-align: center;
    font-size: 10px;
    color: rgba(255,255,255,0.4);
  }

  .weather-detail span {
    display: block;
    color: #fff;
    font-size: 12px;
    margin-bottom: 2px;
  }

  /* NETWORK */
  .net-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 6px;
  }

  .net-label { color: rgba(255,255,255,0.4); }
  .net-val { color: var(--green); font-family: 'Orbitron', monospace; font-size: 10px; }

  /* HEALTH */
  .health-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    margin-bottom: 6px;
    color: rgba(255,255,255,0.7);
  }

  .health-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    flex-shrink: 0;
  }

  /* CENTER */
  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* GRID BACKGROUND */
  .center::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* =======================================================
     ── MACBOOK GAYE PRO BLOOMING ORB ARCHITECTURE (CSS) ──
     ======================================================= */
  .orb-container {
    position: relative;
    width: 340px;
    height: 340px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
  }

  /* Segmentli fütüristik halkalar */
  .orb-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px dashed rgba(0,245,255,0.2);
    transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
  }

  .orb-ring-1 { width: 300px; height: 300px; animation: orbRotate 30s linear infinite; border-style: dashed; }
  .orb-ring-2 { width: 250px; height: 250px; animation: orbRotate 18s linear infinite reverse; border-color: rgba(0,128,255,0.25); border-style: dotted; }
  .orb-ring-3 { width: 200px; height: 200px; animation: orbRotate 12s linear infinite; border-color: rgba(0,245,255,0.15); border-style: dashed; }

  @keyframes orbRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .orb-core {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid rgba(0,245,255,0.4);
    background: radial-gradient(circle at center,
      rgba(0,245,255,0.25) 0%,
      rgba(0,128,255,0.1) 50%,
      transparent 75%
    );
    box-shadow: inset 0 0 20px rgba(0,245,255,0.2);
    transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
    z-index: 10;
  }

  .orb-particles {
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 50%;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--cyan);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--cyan);
    animation: floatParticle linear infinite;
  }

  @keyframes floatParticle {
    0% { transform: translateY(0) translateX(0) scale(1); opacity: 1; }
    100% { transform: translateY(-70px) translateX(var(--dx)) scale(0); opacity: 0; }
  }

  .orb-inner {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,245,255,0.6), rgba(0,128,255,0.3), transparent);
    box-shadow: 0 0 25px var(--cyan), inset 0 0 15px rgba(0,245,255,0.3);
    transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .orb-bars {
    display: flex;
    gap: 4px;
    align-items: center;
    transition: all 0.3s ease;
  }

  .orb-bar {
    width: 3px;
    background: rgba(255,255,255,0.9);
    border-radius: 2px;
    animation: barDance 0.6
